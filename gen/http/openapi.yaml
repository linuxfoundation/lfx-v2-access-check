swagger: "2.0"
info:
    title: LFX V2 - Access Check Service
    description: LFX Access Check Service for bulk access checks
    version: 0.0.1
host: localhost:80
consumes:
    - application/json
    - application/xml
    - application/gob
produces:
    - application/json
    - application/xml
    - application/gob
paths:
    /access-check:
        post:
            tags:
                - access-svc
            summary: check-access access-svc
            description: Check access permissions for resource-action pairs
            operationId: access-svc#check-access
            parameters:
                - name: v
                  in: query
                  description: API version
                  required: true
                  type: string
                  enum:
                    - "1"
                - name: Authorization
                  in: header
                  description: JWT token from Heimdall
                  required: true
                  type: string
                - name: Check-AccessRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/AccessSvcCheckAccessRequestBody'
                    required:
                        - requests
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/AccessSvcCheckAccessResponseBody'
                        required:
                            - results
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/AccessSvcCheckAccessBadRequestResponseBody'
                "401":
                    description: Unauthorized response.
                    schema:
                        $ref: '#/definitions/AccessSvcCheckAccessUnauthorizedResponseBody'
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/AccessSvcCheckAccessInternalServerErrorResponseBody'
                "503":
                    description: Service Unavailable response.
                    schema:
                        $ref: '#/definitions/AccessSvcCheckAccessServiceUnavailableResponseBody'
            schemes:
                - http
            security:
                - jwt_header_Authorization: []
    /my-grants:
        get:
            tags:
                - access-svc
            summary: my-grants access-svc
            description: Get the caller's direct access grants for a given object type
            operationId: access-svc#my-grants
            parameters:
                - name: v
                  in: query
                  description: API version
                  required: true
                  type: string
                  enum:
                    - "1"
                - name: object_type
                  in: query
                  description: Object type to query grants for
                  required: true
                  type: string
                  pattern: ^[a-z]+(_[a-z]+)*$
                - name: Authorization
                  in: header
                  description: JWT token from Heimdall
                  required: true
                  type: string
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/AccessSvcMyGrantsResponseBody'
                        required:
                            - grants
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/AccessSvcMyGrantsBadRequestResponseBody'
                "401":
                    description: Unauthorized response.
                    schema:
                        $ref: '#/definitions/AccessSvcMyGrantsUnauthorizedResponseBody'
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/AccessSvcMyGrantsInternalServerErrorResponseBody'
                "503":
                    description: Service Unavailable response.
                    schema:
                        $ref: '#/definitions/AccessSvcMyGrantsServiceUnavailableResponseBody'
            schemes:
                - http
            security:
                - jwt_header_Authorization: []
definitions:
    AccessSvcCheckAccessBadRequestResponseBody:
        title: 'Mediatype identifier: application/vnd.goa.error; view=default'
        type: object
        properties:
            fault:
                type: boolean
                description: Is the error a server-side fault?
                example: false
            id:
                type: string
                description: ID is a unique identifier for this particular occurrence of the problem.
                example: 123abc
            message:
                type: string
                description: Message is a human-readable explanation specific to this occurrence of the problem.
                example: parameter 'p' must be an integer
            name:
                type: string
                description: Name is the name of this class of errors.
                example: bad_request
            temporary:
                type: boolean
                description: Is the error temporary?
                example: true
            timeout:
                type: boolean
                description: Is the error a timeout?
                example: true
        description: Bad request (default view)
        example:
            fault: true
            id: 123abc
            message: parameter 'p' must be an integer
            name: bad_request
            temporary: true
            timeout: false
        required:
            - name
            - id
            - message
            - temporary
            - timeout
            - fault
